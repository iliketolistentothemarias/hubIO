<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Rounded background -->
  <rect width="32" height="32" rx="8" fill="#8B6F47"/>

  <!-- Connection lines between nodes -->
  <line x1="16" y1="7" x2="25" y2="22" stroke="#F5ECD7" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="7" x2="7" y2="22" stroke="#F5ECD7" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="7" y1="22" x2="25" y2="22" stroke="#F5ECD7" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Spokes to center -->
  <line x1="16" y1="16" x2="16" y2="7" stroke="#F5ECD7" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <line x1="16" y1="16" x2="25" y2="22" stroke="#F5ECD7" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <line x1="16" y1="16" x2="7" y2="22" stroke="#F5ECD7" stroke-width="1" stroke-linecap="round" opacity="0.4"/>

  <!-- Outer nodes -->
  <circle cx="16" cy="7" r="3" fill="#FFF8EE"/>
  <circle cx="25" cy="22" r="3" fill="#FFF8EE"/>
  <circle cx="7" cy="22" r="3" fill="#FFF8EE"/>

  <!-- Center hub node -->
  <circle cx="16" cy="16" r="2.5" fill="#D4A574"/>
</svg>
